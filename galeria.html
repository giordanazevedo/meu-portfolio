<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Artes | Giordana Livia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="bg-galeria">

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">GL<span>.</span></a>
            <a href="index.html" class="btn-back"><i class='bx bx-left-arrow-alt'></i> Voltar</a>
        </div>
    </nav>

    <main class="galeria-section">
        <div class="container">
            <h1 class="section-title">Minha Galeria de <span>Artes</span></h1>
            
            <div class="grid-galeria">
            <div class="card-art">
                    <img src="camiseta-avante.jpg" alt="Camiseta Sempre Avante">
                    <div class="card-art-info">
                        <h3>Sempre Avante</h3>
                        <p>Design de Estampa</p>
                    </div>
                </div>  
                

                     <div class="card-art">
                    <img src="camiseta-cha.jpg" alt="Chá das Amigas">
                    <div class="card-art-info">
                        <h3>Chá das Amigas</h3>
                        <p>Ilustração e Estampa</p>
                    </div>
                </div>

                <div class="card-art">
                    <img src="camiseta-caminhada.jpg" alt="Caminhada do Bem">
                    <div class="card-art-info">
                        <h3>Caminhada do Bem</h3>
                        <p>Design para Eventos</p>
                    </div>
                </div>
                
                <div class="card-art">
                    <img src="mockup-livtech.jpg" alt="Livtech Branding">
                    <div class="card-art-info">
                        <h3>Livtech Branding</h3>
                        <p>Identidade Visual & UI/UX</p>
                    </div>
                </div>

               

                <div class="card-art">
                    <img src="canecas-hp.jpg" alt="Canecas Harry Potter">
                    <div class="card-art-info">
                        <h3>Coleção Hogwarts</h3>
                        <p>Personalizados</p>
                    </div>
                </div>


                <div class="card-art">
                    <img src="posts-igreja.jpg" alt="Social Media IASD">
                    <div class="card-art-info">
                        <h3>Social Media IASD</h3>
                        <p>Posts e Convites</p>
                    </div>
                </div>

                
            </div>
        </div>
    </main>

</body>
</html>
